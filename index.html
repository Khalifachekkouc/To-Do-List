<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="ToDoList.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Edu+TAS+Beginner:wght@400..700&display=swap" rel="stylesheet" />
</head>
<body>
<div class="container">

    <header class="head">
        <h1>My To-Do List</h1>
        <p>Stay organized and get things done</p>
    </header>

    <section class="inputs-section">
        <div class="card form-card">
            <div class="tape"></div>
            <div class="grid-2">
                <input type="text" placeholder="Task Title" id="title">
                <input type="text" placeholder="Category (Work, Home,...)" id="category">
            </div>
            <div class="grid-2">
                <input type="text" placeholder="Description" id="description">
                <select id="priority">
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                </select>
            </div>
            <button id="submit-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 5v14M5 12h14"></path>
                </svg>
                Create Task
            </button>
        </div>
    </section>
    <section class="outputs-section">
        <div class="search-block card">
            <div class="tape"></div>
            <input type="text" onkeyup="searchData(this.value)" placeholder="Search by Task Title or Category..." id="search">
        </div>
        <div id="deleteAllBtnContainer"></div>
        <div id="cards-container" class="cards-grid"></div>
    </section>
</div>
<script type="module" src="ToDoList.js"></script>
</body>
</html>
